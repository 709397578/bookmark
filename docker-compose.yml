services:
  postgres:
    image: postgres:15-alpine
    container_name: pintree-db
    environment:
      POSTGRES_DB: pintree
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INCLUDE_CHROME: ${INCLUDE_CHROME:-0}
    container_name: pintree-backend
    environment:
      PORT: 8080
      DATABASE_URL: host=postgres user=postgres password=${DB_PASSWORD:-postgres123} dbname=pintree port=5432 sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret}
      JWT_EXPIRATION: 86400
      FRONTEND_URL: http://localhost
      UPLOAD_PATH: /root/uploads
    ports:
      - '8080:8080'
    volumes:
      - upload_data:/root/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pintree-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:
